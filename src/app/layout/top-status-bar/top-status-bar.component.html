<header class="top-status-bar">
  <div class="top-status-bar__inner">
    <div class="top-status-bar__identity">
      <span class="top-status-bar__mark">
        <svg viewBox="0 0 24 24" class="top-status-bar__mark-icon" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 3 4 8v8l8 5 8-5V8z"></path>
          <path d="m8 10 4-2 4 2-4 2-4-2Zm0 4 4 2 4-2"></path>
        </svg>
      </span>
      <div>
        <p class="top-status-bar__name">{{ profileName }}</p>
        <p class="top-status-bar__title">{{ profileTitle }}</p>
      </div>
    </div>
    <button
      type="button"
      class="top-status-bar__menu"
      aria-label="Toggle navigation menu"
      (click)="menuToggled.emit()"
    >
      <svg viewBox="0 0 24 24" class="top-status-bar__menu-icon" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 7h16M4 12h16M4 17h16"></path>
      </svg>
    </button>
  </div>

  @if (mobileMenuOpen) {
    <nav class="top-status-bar__nav" aria-label="Mobile navigation">
      <ul class="top-status-bar__nav-list">
        @for (item of navItems; track item.id) {
          <li>
            <a
              [href]="'#' + item.id"
              class="top-status-bar__nav-link"
              [class.is-active]="item.id === activeSection"
              (click)="sectionSelected.emit(item.id)"
            >
              <svg viewBox="0 0 24 24" class="top-status-bar__nav-icon" fill="none" stroke="currentColor" stroke-width="1.8">
                <path [attr.d]="navPath(item.icon)"></path>
              </svg>
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>
  }
</header>
