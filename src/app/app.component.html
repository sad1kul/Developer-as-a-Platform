<div class="min-h-screen bg-bg-main bg-grid-fade text-text-main">
  <div class="pointer-events-none fixed inset-0 opacity-40">
    <div class="absolute inset-0 bg-grid-pattern"></div>
  </div>

  <app-top-status-bar
    [navItems]="navItems"
    [activeSection]="activeSection()"
    [mobileMenuOpen]="mobileMenuOpen()"
    [profileName]="profile.name"
    [profileTitle]="profile.title"
    (menuToggled)="toggleMobileMenu()"
    (sectionSelected)="setActiveSection($event)"
  ></app-top-status-bar>

  <div class="relative mx-auto portfolio-container px-3 py-3 sm:px-4 lg:px-5 lg:py-4 xl:px-6">
    <div class="portfolio-layout-grid">
      <app-sidebar
        [navItems]="navItems"
        [activeSection]="activeSection()"
        [profileName]="profile.name"
        [profileTitle]="profile.title"
        [systemStatus]="systemStatus"
        [quickLinks]="quickLinks"
        [cvDownloading]="cvDownloadContext() === 'sidebar'"
        (sectionSelected)="setActiveSection($event)"
        (cvDownloadStarted)="showCvDownloadFeedback('sidebar')"
      ></app-sidebar>

      <main class="flex flex-col gap-4">
        <div class="rounded-2xl border border-border-soft/90 bg-bg-surface/85 px-4 py-3 shadow-soft backdrop-blur sm:px-5">
          <div class="flex flex-wrap items-center justify-between gap-3">
            <p class="inline-flex items-center gap-2 text-sm font-medium text-text-main">
              <span class="rounded-md border border-emerald/35 bg-emerald/15 px-2 py-1 font-mono text-xs text-emerald">&gt;_</span>
              Developer Platform Mode
            </p>
            <p class="inline-flex items-center gap-2 text-sm text-text-muted">
              <span class="h-2.5 w-2.5 rounded-full bg-emerald"></span>
              {{ profile.availability }}
            </p>
          </div>
        </div>

        <app-hero
          [profile]="profile"
          [quickLinks]="quickLinks"
          [cvDownloading]="cvDownloadContext() === 'hero'"
          (sectionRequested)="scrollToSection($event)"
          (cvDownloadStarted)="showCvDownloadFeedback('hero')"
        ></app-hero>

        <app-workbench></app-workbench>

        <app-technical-profile [principles]="principles" [groups]="techProfileGroups"></app-technical-profile>

        <app-architecture [summary]="architectureSummary" [layers]="architectureLayers"></app-architecture>

        <app-case-studies [caseStudies]="caseStudies"></app-case-studies>

        <app-systems-in-progress [systems]="systemsInProgress"></app-systems-in-progress>

        <app-about [paragraphs]="aboutParagraphs"></app-about>

        <app-contact
          [opportunityText]="contactOpportunityText"
          [quickLinks]="quickLinks"
          [cvDownloading]="cvDownloadContext() === 'contact'"
          (cvDownloadStarted)="showCvDownloadFeedback('contact')"
        ></app-contact>
      </main>

      <app-right-context-panel></app-right-context-panel>
    </div>
  </div>
</div>
