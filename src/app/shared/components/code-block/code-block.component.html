<div class="rounded-xl border border-border-soft bg-bg-soft/65 p-4">
  <p class="text-sm font-medium text-cyan">{{ sample.label }}</p>
  <div class="mt-2 flex items-start justify-between gap-3 rounded-md border border-border-soft bg-bg-main/70 px-3 py-2">
    <span class="font-mono text-xs text-text-muted break-all">{{ sample.filename }}</span>
    <button
      type="button"
      class="inline-flex shrink-0 items-center gap-1 text-xs text-text-muted transition hover:text-cyan mt-0.5"
      (click)="copyRequested.emit()"
    >
      <svg viewBox="0 0 24 24" class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 9h11v11H9z"></path>
        <path d="M4 15V4h11"></path>
      </svg>
      {{ copyState === 'copied' ? 'Copied' : 'Copy' }}
    </button>
  </div>
  <div class="mt-3 min-h-[320px] overflow-x-auto rounded-md border border-border-soft bg-[#07111f] p-4 font-mono text-[13px] leading-relaxed">
    @for (line of sample.lines; track $index) {
      <div class="code-line flex gap-3">
        <span class="w-6 shrink-0 text-right text-[#5f7391]">{{ $index + 1 }}</span>
        <code [innerHTML]="line"></code>
      </div>
    }
  </div>
</div>
