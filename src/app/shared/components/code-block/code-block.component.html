<div class="code-sample">
  <p class="code-sample__label">{{ sample.label }}</p>
  <div class="code-sample__header">
    <span class="code-sample__filename">{{ sample.filename }}</span>
    <button
      type="button"
      class="code-sample__copy"
      (click)="copyRequested.emit()"
    >
      <svg viewBox="0 0 24 24" class="code-sample__copy-icon" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M9 9h11v11H9z"></path>
        <path d="M4 15V4h11"></path>
      </svg>
      {{ copyState === 'copied' ? 'Copied' : 'Copy' }}
    </button>
  </div>
  <div class="code-sample__body">
    @for (line of sample.lines; track $index) {
      <div class="code-sample__line code-line">
        <span class="code-sample__line-number">{{ $index + 1 }}</span>
        <code [innerHTML]="line"></code>
      </div>
    }
  </div>
</div>
