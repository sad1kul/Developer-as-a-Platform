<app-section-card sectionId="systems">
  <h2 class="text-2xl font-semibold tracking-tight">Product Roadmap</h2>
  <div class="mt-4 grid gap-3 md:grid-cols-2">
    @for (system of systems; track system.title) {
      <article class="roadmap-card">
        <div class="roadmap-card__header">
          <h3 class="roadmap-card__title">{{ system.title }}</h3>
          <app-status-badge [label]="system.status" [classes]="statusClass(system.status)"></app-status-badge>
        </div>

        <div class="roadmap-card__section">
          <p class="roadmap-card__label">Business problem</p>
          <p class="mt-1">{{ system.businessProblem }}</p>
        </div>

        <div class="roadmap-card__section">
          <p class="roadmap-card__label">Planned direction</p>
          <p class="mt-1">{{ system.plannedDirection }}</p>
        </div>
      </article>
    }
  </div>
</app-section-card>
