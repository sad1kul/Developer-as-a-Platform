<app-section-card sectionId="tech-profile">
  <h2 class="text-2xl font-semibold tracking-tight">Technical Profile</h2>

  <div class="mt-4 grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
    @for (principle of principles; track principle.title) {
      <article class="rounded-xl border border-border-soft bg-bg-soft/65 p-4">
        <div class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-border-soft bg-bg-main/60 text-cyan">
          <svg viewBox="0 0 24 24" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8">
            <path [attr.d]="principlePath(principle.icon)"></path>
          </svg>
        </div>
        <h3 class="mt-3 text-base font-medium">{{ principle.title }}</h3>
        <p class="mt-1 text-sm text-text-muted">{{ principle.description }}</p>
      </article>
    }
  </div>

  <div class="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-3">
    @for (group of groups; track group.title) {
      <article class="rounded-xl border border-border-soft bg-bg-soft/65 p-4">
        <h3 class="text-sm font-semibold uppercase tracking-[0.08em] text-cyan">{{ group.title }}</h3>
        <div class="mt-3 flex flex-wrap gap-2">
          @for (item of group.items; track item) {
            <span class="rounded-md border border-border-soft bg-bg-main/65 px-2 py-1 text-xs text-text-main">
              {{ item }}
            </span>
          }
        </div>
      </article>
    }
  </div>
</app-section-card>
