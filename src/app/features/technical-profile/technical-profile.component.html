<app-section-card sectionId="tech-profile">
  <h2 class="text-2xl font-semibold tracking-tight">Technical Profile</h2>

  <div class="mt-4 grid gap-3 sm:grid-cols-2 xl:grid-cols-3">
    @for (principle of principles; track principle.title) {
      <article class="profile-card">
        <div class="profile-card__icon">
          <svg viewBox="0 0 24 24" class="profile-card__svg" fill="none" stroke="currentColor" stroke-width="1.8">
            <path [attr.d]="principlePath(principle.icon)"></path>
          </svg>
        </div>
        <h3 class="profile-card__title">{{ principle.title }}</h3>
        <p class="profile-card__copy">{{ principle.description }}</p>
      </article>
    }
  </div>

  <div class="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-3">
    @for (group of groups; track group.title) {
      <article class="profile-card">
        <h3 class="profile-card__eyebrow">{{ group.title }}</h3>
        <div class="profile-card__tags">
          @for (item of group.items; track item) {
            <span class="profile-card__tag">
              {{ item }}
            </span>
          }
        </div>
      </article>
    }
  </div>
</app-section-card>
