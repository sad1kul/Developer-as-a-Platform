<app-section-card sectionId="contact">
  <h2 class="text-2xl font-semibold tracking-tight">Contact / Opportunities</h2>
  <p class="mt-3 max-w-3xl text-sm leading-relaxed text-text-muted sm:text-base">
    {{ opportunityText }}
  </p>

  <div class="mt-5 flex flex-wrap gap-3">
    @for (link of quickLinks; track link.label) {
      <app-cv-download-button
        [link]="link"
        variant="contact"
        [cvDownloading]="cvDownloading"
        (cvDownloadStarted)="cvDownloadStarted.emit()"
      ></app-cv-download-button>
    }
  </div>
</app-section-card>
