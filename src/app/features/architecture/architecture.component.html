<app-section-card sectionId="architecture">
  <h2 class="text-2xl font-semibold tracking-tight">Architecture Snapshot</h2>
  <p class="mt-3 max-w-3xl text-sm leading-relaxed text-text-muted">
    {{ summary }}
  </p>

  <div class="mt-4 grid gap-3 md:grid-cols-3">
    @for (layer of layers; track layer.title) {
      <article class="architecture-card">
        <h3 class="architecture-card__title" [ngClass]="accentClass(layer.accent)">{{ layer.title }}</h3>
        <p class="architecture-card__copy">{{ layer.description }}</p>
      </article>
    }
  </div>
</app-section-card>
